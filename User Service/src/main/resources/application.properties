spring.application.name=User Service
server.port=${USER_SERVICE_PORT:8081}

# ── MySQL (Docker) ──
spring.datasource.url=${USER_DB_URL:jdbc:mysql://localhost:3307/sportcenter_user_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER:sportcenter}
spring.datasource.password=${DB_PASSWORD:sportcenter123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──
spring.jpa.hibernate.ddl-auto=${JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Actuator health ──
management.endpoints.web.exposure.include=health
management.endpoint.health.probes.enabled=true
