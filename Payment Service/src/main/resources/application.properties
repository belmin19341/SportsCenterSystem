spring.application.name=Payment Service
server.port=${PAYMENT_SERVICE_PORT:8084}

# ── MySQL (Docker) ──
spring.datasource.url=${PAYMENT_DB_URL:jdbc:mysql://localhost:3310/sportcenter_payment_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER:sportcenter}
spring.datasource.password=${DB_PASSWORD:sportcenter123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──
spring.jpa.hibernate.ddl-auto=${JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
