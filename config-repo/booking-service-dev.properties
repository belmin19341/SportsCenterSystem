server.port=${BOOKING_SERVICE_PORT:8083}

spring.datasource.url=${BOOKING_DB_URL:jdbc:mysql://localhost:3309/sportcenter_booking_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER:sportcenter}
spring.datasource.password=${DB_PASSWORD:sportcenter123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jpa.properties.hibernate.generate_statistics=true
logging.level.org.hibernate.stat=DEBUG
logging.level.org.hibernate.SQL=DEBUG

# ── Z5 — Feign + Resilience4j ──
spring.cloud.openfeign.circuitbreaker.enabled=true
spring.cloud.openfeign.client.config.default.connectTimeout=2000
spring.cloud.openfeign.client.config.default.readTimeout=5000
spring.cloud.openfeign.client.config.default.loggerLevel=basic

# Default circuit breaker config — overridden per instance below
resilience4j.circuitbreaker.configs.default.slidingWindowSize=10
resilience4j.circuitbreaker.configs.default.minimumNumberOfCalls=5
resilience4j.circuitbreaker.configs.default.failureRateThreshold=50
resilience4j.circuitbreaker.configs.default.waitDurationInOpenState=10s
resilience4j.circuitbreaker.configs.default.permittedNumberOfCallsInHalfOpenState=3
resilience4j.circuitbreaker.configs.default.slowCallDurationThreshold=4s
resilience4j.circuitbreaker.configs.default.slowCallRateThreshold=80

# Per-Feign-client circuit breakers (name = <FeignClientInterface>#<method>(<params>) by default;
# we use the base id matching the client interface simple name)
resilience4j.circuitbreaker.instances.ResourceServiceClient.baseConfig=default
resilience4j.circuitbreaker.instances.PaymentServiceClient.baseConfig=default
resilience4j.circuitbreaker.instances.UserServiceClient.baseConfig=default
