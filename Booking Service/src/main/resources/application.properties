# Local fallback values (mirror config-repo/booking-service-dev.properties).
# Spring Cloud Config (when reachable) overrides these.

server.port=${BOOKING_SERVICE_PORT:8083}

spring.datasource.url=${BOOKING_DB_URL:jdbc:mysql://localhost:3309/sportcenter_booking_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER:sportcenter}
spring.datasource.password=${DB_PASSWORD:sportcenter123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.jpa.properties.hibernate.generate_statistics=true
logging.level.org.hibernate.stat=INFO
logging.level.org.hibernate.SQL=INFO

eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}
eureka.instance.prefer-ip-address=true
eureka.instance.instance-id=${spring.application.name}:${server.port}:${random.value}

management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
