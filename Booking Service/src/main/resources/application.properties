spring.application.name=Booking Service
server.port=${BOOKING_SERVICE_PORT:8083}

# ── MySQL (Docker) ──
spring.datasource.url=${BOOKING_DB_URL:jdbc:mysql://localhost:3309/sportcenter_booking_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER:sportcenter}
spring.datasource.password=${DB_PASSWORD:sportcenter123}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ── JPA / Hibernate ──
spring.jpa.hibernate.ddl-auto=${JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ── Hibernate Statistics (N+1 detection) ──
spring.jpa.properties.hibernate.generate_statistics=true
logging.level.org.hibernate.stat=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ── OpenAPI / Swagger ──
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
